<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>
    <div class="container col-lg-8 col-sm-12">
        <h2>Danh sách sinh viên</h2>
        <div class="my-3 ">
            <div class="form-group">
                <div class="row">
                    <div class="col">
                        <label for="name">Họ và tên</label>
                        <input type="text" name="name" class="form-control" id="name" placeholder="Nhập tên">
                    </div>
                    <div class="col">
                        <label for="age">Tuổi</label>
                        <input type="text" name="age" class="form-control" id="age" placeholder="Nhập tuổi">
                    </div>
                </div>
                <p class="mt-3">Chọn một trong hai button, sau đó dữ liệu sẽ được thêm vào một trong hai bảng tương ứng.
                    Ngoài ra, dữ liệu cũng được lưu vào một trong hai loại storage tương ứng.</p>
                <div class="form-group ">
                    <button type="button" class="btn btn-primary" id="btnLocal">Thêm Local Storage</button>
                    <button type="button" class="btn btn-danger" id="btnSession"> Thêm Session Storage</button>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col">
                <h5><span class="text-primary">LocalStorage</span></h5>
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên</th>
                            <th>Tuổi</th>
                        </tr>
                    </thead>
                    <tbody id="table1"></tbody>
                </table>
            </div>
            <div class="col">
                <h5><span class="text-danger">SessionStorage</span></h5>
                <table class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Tên</th>
                            <th>Tuổi</th>
                        </tr>
                    </thead>
                    <tbody id="table2"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="bai04.js"></script>
</body>

</html>
